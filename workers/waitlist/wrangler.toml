name = "ermis-waitlist"
main = "src/worker.js"
compatibility_date = "2026-05-01"

# Create the KV namespace once with:
#   npx wrangler kv namespace create WAITLIST_KV
# then paste the returned id below.
[[kv_namespaces]]
binding = "WAITLIST_KV"
id = "PASTE_NAMESPACE_ID_HERE"

# Set the Turnstile secret once with:
#   npx wrangler secret put TURNSTILE_SECRET
# Test key for local: 1x0000000000000000000000000000000AA
